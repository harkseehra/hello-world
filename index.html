<!DOCTYPE html>
<html lang="en"
  data-theme="light"
  data-font="vazir"
  data-en-font="sans"
  data-fa-color="irozumi"
  data-en-color="asagao"
  data-mode="focus">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مثنوی · Masnavi</title>

  <!-- PWA / Home Screen -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Masnavi">
  <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0F0E0E" media="(prefers-color-scheme: dark)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&family=Harmattan:wght@400;500;600;700&family=Markazi+Text:wght@400;500;600;700&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;1,400&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+Gurmukhi:wght@400;500&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="progress-bar" role="progressbar" aria-hidden="true"></div>

  <!-- ── Nav ── -->
  <nav id="top-nav" aria-label="Main navigation">

    <a id="site-logo" href="#" aria-label="Masnavi — table of contents">
      <!-- Manuscript / contents icon -->
      <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <line x1="8" y1="7"  x2="16" y2="7"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="8" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="8" y1="15" x2="13" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span lang="fa" dir="rtl" class="logo-fa">مثنوی</span>
    </a>

    <div id="book-tabs" role="tablist" aria-label="Select book">
      <button class="book-tab active" role="tab" aria-selected="true"  data-book="1">Book 1</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="2">Book 2</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="3">Book 3</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="4">Book 4</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="5">Book 5</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="6">Book 6</button>
    </div>

    <!-- Centre pill — informational on desktop, book-selector trigger on mobile -->
    <button id="nav-book-pill" aria-label="Select book" tabindex="-1">Book 1</button>

    <div id="nav-actions">
      <button id="btn-menu" class="nav-btn" aria-label="Open menu" aria-expanded="false">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <line x1="2" y1="4.5"  x2="14" y2="4.5"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2" y1="8"    x2="14" y2="8"    stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2" y1="11.5" x2="14" y2="11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="btn-bookmarks" class="nav-btn" aria-label="Bookmarks" aria-expanded="false">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 2h10a1 1 0 0 1 1 1v11l-6-3.5L2 14V3a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="btn-search" class="nav-btn" aria-label="Search">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.4"/>
          <line x1="10.5" y1="10.5" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="btn-settings" class="nav-btn nav-btn--text" aria-label="Display options" aria-expanded="false">Aa</button>
      <button id="btn-mode" class="nav-btn" aria-label="Toggle scholar view">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="1" y="2" width="5.5" height="12" rx="1" stroke="currentColor" stroke-width="1.4"/>
          <rect x="9.5" y="2" width="5.5" height="12" rx="1" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ── Mobile menu ── -->
  <div id="mobile-menu" aria-hidden="true">
    <div id="mobile-book-tabs" role="tablist" aria-label="Select book">
      <button class="book-tab active" role="tab" aria-selected="true"  data-book="1">Book 1</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="2">Book 2</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="3">Book 3</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="4">Book 4</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="5">Book 5</button>
      <button class="book-tab"        role="tab" aria-selected="false" data-book="6">Book 6</button>
    </div>
  </div>

  <!-- ── Settings panel ── -->
  <div id="settings-panel" aria-hidden="true" role="dialog" aria-label="Display options">

    <div class="settings-section">
      <p class="settings-label">Farsi Script</p>
      <div class="settings-row" id="font-options">
        <button class="settings-opt active" data-font="vazir">Vazirmatn</button>
        <button class="settings-opt"        data-font="nazanin">Nazanin</button>
        <button class="settings-opt"        data-font="arial">Arial</button>
        <button class="settings-opt"        data-font="nastaliq">Nastaliq</button>
      </div>
    </div>

    <div class="settings-divider"></div>

    <div class="settings-section">
      <p class="settings-label">Farsi Colour</p>
      <div class="settings-row" id="fa-color-options">
        <button class="settings-opt color-swatch active" data-fa-color="irozumi" aria-label="Ink">
          <span class="swatch-dot" style="--sw: #3C3D3E; --sw-dark: #E0E1E0;"></span>
        </button>
        <button class="settings-opt color-swatch" data-fa-color="nila" aria-label="Lapis">
          <span class="swatch-dot" style="--sw: #2C3A8C; --sw-dark: #7EA8E8;"></span>
        </button>
        <button class="settings-opt color-swatch" data-fa-color="qahwa" aria-label="Coffee">
          <span class="swatch-dot" style="--sw: #6F4E37; --sw-dark: #C4956A;"></span>
        </button>
        <button class="settings-opt color-swatch" data-fa-color="sorkh" aria-label="Persian Red">
          <span class="swatch-dot" style="--sw: #CC3333; --sw-dark: #E07878;"></span>
        </button>
      </div>
    </div>

    <div class="settings-divider"></div>

    <div class="settings-section">
      <p class="settings-label">English Font</p>
      <div class="settings-row" id="en-font-options">
        <button class="settings-opt active" data-en-font="sans">Sans</button>
        <button class="settings-opt"        data-en-font="serif">Serif</button>
      </div>
    </div>

    <div class="settings-section">
      <p class="settings-label">English Colour</p>
      <div class="settings-row" id="en-color-options">
        <button class="settings-opt color-swatch active" data-en-color="asagao" aria-label="Asa-Gao">
          <span class="swatch-dot" style="--sw: #1747B0; --sw-dark: #7EB0E8;"></span>
        </button>
        <button class="settings-opt color-swatch" data-en-color="konpeki" aria-label="Kon-Peki">
          <span class="swatch-dot" style="--sw: #0077CC; --sw-dark: #56C0FF;"></span>
        </button>
        <button class="settings-opt color-swatch" data-en-color="noir" aria-label="Noir">
          <span class="swatch-dot" style="--sw: #1C1C1E; --sw-dark: #E8E8F2;"></span>
        </button>
      </div>
    </div>

    <div class="settings-divider"></div>

    <div class="settings-section" id="api-key-section">
      <p class="settings-label">Translate</p>
      <div id="api-key-row">
        <span id="api-key-status">No key saved</span>
        <button class="settings-opt" id="btn-api-key-edit">Set Key</button>
      </div>
      <div id="api-key-form" hidden>
        <input type="password" id="api-key-input" placeholder="sk-ant-api03-…" autocomplete="off" spellcheck="false">
        <button id="btn-api-key-save" class="settings-opt">Save</button>
        <button id="btn-api-key-clear" class="settings-opt">Clear</button>
      </div>
    </div>

  </div>

  <!-- ── Theme pill (right edge, upper) ── -->
  <div id="theme-pill" aria-label="Cycle theme">
    <button id="btn-theme-toggle" aria-label="Switch to dark mode" aria-pressed="false">
      <!-- Sun (visible in light) -->
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.6"/>
        <line x1="12"    y1="2"     x2="12"    y2="5"     stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="12"    y1="19"    x2="12"    y2="22"    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="2"     y1="12"    x2="5"     y2="12"    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="19"    y1="12"    x2="22"    y2="12"    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="4.93"  y1="4.93"  x2="7.05"  y2="7.05"  stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="16.95" y1="16.95" x2="19.07" y2="19.07" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="4.93"  y1="19.07" x2="7.05"  y2="16.95" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="16.95" y1="7.05"  x2="19.07" y2="4.93"  stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <!-- Moon (visible in dark) -->
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <!-- Paper / Kaghaz (visible in kaghaz) -->
      <svg class="icon-kaghaz" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6 2h9l4 4v16a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"
              stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <polyline points="15 2 15 7 19 7" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <line x1="9" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="9" y1="15" x2="15" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- ── Size pill (right edge, lower) ── -->
  <div id="size-pill" aria-label="Text size">
    <button id="size-up"   aria-label="Increase text size">A</button>
    <div class="size-divider"></div>
    <button id="size-down" aria-label="Decrease text size">a</button>
  </div>

  <!-- ── Search ── -->
  <div id="search-overlay" aria-hidden="true"></div>
  <div id="search-panel" aria-hidden="true" role="dialog" aria-label="Search">
    <div id="search-header">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10.5" y1="10.5" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="text" inputmode="numeric" placeholder="Go to verse…" autocomplete="off" spellcheck="false" aria-label="Go to verse number">
    </div>
    <div id="search-results" role="list"></div>
  </div>

  <!-- ── Highlight picker ── -->
  <div id="hl-picker" aria-hidden="true">
    <button class="hl-swatch" data-hl-color="yellow" aria-label="Yellow highlight"></button>
    <button class="hl-swatch" data-hl-color="green"  aria-label="Green highlight"></button>
    <button class="hl-swatch" data-hl-color="blue"   aria-label="Blue highlight"></button>
    <button class="hl-swatch" data-hl-color="pink"   aria-label="Pink highlight"></button>
    <button class="hl-swatch" data-hl-color="purple" aria-label="Purple highlight"></button>
    <div class="hl-divider"></div>
    <button class="hl-clear" data-hl-color="" aria-label="Remove highlight">✕</button>
  </div>

  <!-- ── Bookmarks ── -->
  <div id="bookmark-backdrop" aria-hidden="true"></div>
  <aside id="bookmark-panel" aria-hidden="true" aria-label="Bookmarks">
    <div id="bookmark-header">
      <p id="bookmark-title">Bookmarks</p>
    </div>
    <div id="bookmark-list" role="list"></div>
  </aside>

  <!-- ── TOC ── -->
  <div id="toc-backdrop" aria-hidden="true"></div>
  <aside id="toc-panel" aria-hidden="true" aria-label="Table of contents">
    <div id="toc-header">
      <p id="toc-book-label">Book 1</p>
      <p id="toc-title">Table of Contents</p>
    </div>
    <div id="toc-list" role="list"></div>
  </aside>

  <!-- ── Main ── -->
  <main id="main-content">
    <div id="focus-view" class="view">
      <div id="focus-scroll"></div>
      <div id="focus-loading" class="loading-state"><div class="loading-spinner"></div><p>Loading…</p></div>
    </div>
    <div id="scholar-view" class="view" aria-hidden="true">
      <div id="scholar-grid"></div>
      <div id="scholar-loading" class="loading-state"><div class="loading-spinner"></div></div>
    </div>

    <!-- Pager shared by both views -->
    <nav id="pager" aria-label="Page navigation" hidden>
      <button id="pager-prev" aria-label="Previous page">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span id="pager-info"></span>
      <button id="pager-next" aria-label="Next page">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </nav>
  </main>

  <script src="js/app.js" type="module"></script>
</body>
</html>
